<title>The Human Condition</title>

<style>

/* --------------------------
   BODY + GRADIENT SHIFT
-------------------------- */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  animation: bgShift 20s infinite alternate ease-in-out;
}

@keyframes bgShift {
  0%   { background: linear-gradient(to bottom right, #d9f7d9, #3cb371); }
  33%  { background: linear-gradient(to bottom right, #dceeff, #4682b4); }
  66%  { background: linear-gradient(to bottom right, #eedcff, #9370db); }
  100% { background: linear-gradient(to bottom right, #fff0cc, #ffb347); }
}

/* Attachment Key */

.attachment-key {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  z-index: 20;
  line-height: 1.6;
  text-transform: lowercase;
}

.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 6px;
}

.green { background:#3cb371; }
.blue { background:#4682b4; }
.purple { background:#9370db; }
.orange { background:#ffb347; }

/* Grid */

.grid {
  display: grid;
  grid-template-columns: repeat(25, 1fr);
  grid-template-rows: repeat(10, 1fr);
  gap: 6px;
  position: absolute;
  width: 100%;
  height: 100vh;
  padding: 30px;
  box-sizing: border-box;
  z-index: 1;
}

.cell {
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.6);
  animation: flicker infinite alternate ease-in-out;
}

@keyframes flicker {
  0% { opacity: 0.25; }
  100% { opacity: 0.65; }
}

/* Centerpiece */

.centerpiece {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 30;
}

.centerpiece img {
  width: 240px;
  height: 240px;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

.button-box {
  background: white;
  margin-top: 20px;
  padding: 12px 24px;
  display: inline-block;
}

#randomBtn {
  border: none;
  background: none;
  font-size: 16px;
  cursor: pointer;
  text-transform: lowercase;
  animation: textShift 8s infinite alternate ease-in-out;
}

@keyframes textShift {
  0%   { color:#3cb371; }
  33%  { color:#4682b4; }
  66%  { color:#9370db; }
  100% { color:#ffb347; }
}

</style>
</head>
