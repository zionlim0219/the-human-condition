<!DOCTYPE html>

<title>The Human Condition</title>

<style>

/* --------------------------
   BODY + GRADIENT SHIFT
-------------------------- */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  animation: bgShift 20s infinite alternate ease-in-out;
}

@keyframes bgShift {
  0%   { background: linear-gradient(to bottom right, #d9f7d9, #3cb371); }
  33%  { background: linear-gradient(to bottom right, #dceeff, #4682b4); }
  66%  { background: linear-gradient(to bottom right, #eedcff, #9370db); }
  100% { background: linear-gradient(to bottom right, #fff0cc, #ffb347); }
}

/* --------------------------
   ATTACHMENT KEY
-------------------------- */
.attachment-key {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  z-index: 20;
  line-height: 1.6;
  text-transform: lowercase;
  background: rgba(255, 255, 255, 0.85);
  padding: 10px 0;
  border-radius: 8px;
}

.attachment-key div {
  display: inline-block;
  margin: 4px 12px;
}

.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 6px;
}

.green { background:#3cb371; }
.blue { background:#4682b4; }
.purple { background:#9370db; }
.orange { background:#ffb347; }

/* --------------------------
   GRID
-------------------------- */
.grid {
  display: grid;
  grid-template-columns: repeat(15, 1fr); /* fewer columns */
  grid-template-rows: repeat(6, 1fr);    /* fewer rows */
  gap: 8px;
  position: absolute;
  width: 100%;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  z-index: 1;
}

.cell {
  background-size: contain;  /* ensures images fit inside cell */
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.2;
  animation: flicker infinite alternate ease-in-out;
  border-radius: 4px;
}

@keyframes flicker {
  0% { opacity: 0.15; }
  50% { opacity: 0.3; }
  100% { opacity: 0.4; }
}

/* --------------------------
   CENTERPIECE
-------------------------- */
.centerpiece {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 30;
}

.centerpiece img {
  width: 350px;  /* bigger image square */
  height: 350px;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: 0 0 25px rgba(0,0,0,0.2);
  display: block;
  margin: 0 auto;
}

.button-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 15px;
  gap: 12px;
}

.button-box button {
  border: none;
  background: white;
  font-size: 16px;
  cursor: pointer;
  padding: 12px 24px;
  text-transform: lowercase;
  animation: textShift 8s infinite alternate ease-in-out;
}

@keyframes textShift {
  0%   { color:#3cb371; }
  33%  { color:#4682b4; }
  66%  { color:#9370db; }
  100% { color:#ffb347; }
}

</style>
</head>

<body>

<div class="attachment-key">
  <div><span class="dot green"></span>secure: comfortable with closeness and trust</div>
  <div><span class="dot blue"></span>avoidant: values independence, withdraws emotionally</div>
  <div><span class="dot purple"></span>disorganized: craves intimacy yet fears it</div>
  <div><span class="dot orange"></span>anxious: seeks closeness but fears abandonment</div>
</div>

<div class="grid"></div>
